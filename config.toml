# Parakeet CLI Configuration

# Modifier key: Alt, Ctrl, Cmd (Command/Meta), or Shift
# Default: Alt
modifier_key = "Ctrl"

# Trigger key: Space, Enter, Tab, Escape
# Default: Space
# The hotkey is captured and WILL NOT reach other applications!
trigger_key = "Space"

# Usage:
# Press modifier_key + trigger_key to START recording
# Press modifier_key + trigger_key again to STOP and transcribe
#
# Works immediately for subsequent recordings (no need to press twice!)
#
# Recommended combinations:
# - Ctrl+Space (default)
# - Ctrl+Enter (alternative)
# - Alt+Space (alternative)


