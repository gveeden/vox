# CleverNote Hyprland Configuration
# Add this to your ~/.config/hypr/hyprland.conf

# Start daemon on login
exec-once = clevernote-daemon

# Bind Ctrl+Space to toggle recording
bind = CTRL, SPACE, exec, clevernote toggle

# Or for push-to-talk
bind = CTRL, SPACE, exec, clevernote start
bindr = CTRL, SPACE, exec, clevernote stop
